<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Ops Gateway</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1e293b; padding: 1rem 2rem; border-bottom: 1px solid #334155; }
  header h1 { font-size: 1.25rem; font-weight: 600; color: #38bdf8; }
  main { flex: 1; display: flex; flex-direction: column; max-width: 800px; width: 100%; margin: 0 auto; padding: 1rem; }
  #messages { flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: 0.75rem; }
  .msg { padding: 0.75rem 1rem; border-radius: 0.75rem; max-width: 80%; line-height: 1.5; }
  .user { background: #2563eb; align-self: flex-end; }
  .assistant { background: #334155; align-self: flex-start; }
  .error { background: #991b1b; align-self: center; }
  #input-row { display: flex; gap: 0.5rem; padding: 1rem 0; }
  #input-row input { flex: 1; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 1rem; outline: none; }
  #input-row input:focus { border-color: #38bdf8; }
  #input-row button { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; background: #2563eb; color: white; font-size: 1rem; cursor: pointer; }
  #input-row button:hover { background: #1d4ed8; }
  .meta { font-size: 0.75rem; color: #94a3b8; margin-top: 0.25rem; }
</style>
</head>
<body>
<header><h1>&#9889; LLM Ops Gateway</h1></header>
<main>
  <div id="messages"></div>
  <div id="input-row">
    <input type="text" id="input" placeholder="Type a message..." autofocus />
    <button id="send">Send</button>
  </div>
</main>
<script>
const API_KEY = localStorage.getItem('api_key') || prompt('Enter your API key:') || '';
localStorage.setItem('api_key', API_KEY);
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendEl = document.getElementById('send');
function addMessage(content, role, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';
    metaDiv.textContent = meta;
    div.appendChild(metaDiv);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  inputEl.value = '';
  sendEl.disabled = true;
  try {
    const resp = await fetch('/v1/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
      body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
    });
    if (!resp.ok) {
      const err = await resp.text();
      addMessage('Error ' + resp.status + ': ' + err, 'error');
      return;
    }
    // Placeholder assistant message — text will stream in
    const assistantDiv = document.createElement('div');
    assistantDiv.className = 'msg assistant';
    messagesEl.appendChild(assistantDiv);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data: ')) continue;
        const dataStr = trimmed.slice(6);
        if (dataStr === '[DONE]') continue;
        try {
          const event = JSON.parse(dataStr);
          if (event.content) {
            assistantDiv.textContent += event.content;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          if (event.error) {
            assistantDiv.className = 'msg error';
            assistantDiv.textContent = 'Error: ' + event.error;
          }
        } catch (_) { /* skip malformed JSON */ }
      }
    }
  } catch (e) {
    addMessage('Network error: ' + e.message, 'error');
  } finally {
    sendEl.disabled = false;
    inputEl.focus();
  }
}
sendEl.addEventListener('click', send);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
